name: Build Production

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DISPATCH_WORKFLOW }}

      - name: Webpack
        run: |
          npm install
          NODE_ENV=production webpack --mode production

      - name: Prune Files
        run: |
          cp docs/index.html docs/cloudyman.html docs/tommyman.html docs/404.html .
          cp docs/CNAME .

          mkdir -p /tmp/keep
          cp -r public /tmp/keep/public
          cp -r tommyman/client/public /tmp/keep/tommyman-client-public
          cp -r cloudyman/client/public /tmp/keep/cloudyman-client-public

          find . -maxdepth 1 ! -name '.' ! -name '.git' \
            ! -name 'index.html' ! -name 'cloudyman.html' \
            ! -name 'tommyman.html' ! -name '404.html' \
            ! -name 'CNAME' ! -name 'LICENSE' ! -name 'README.md' \
            -exec rm -rf {} \;

          mv /tmp/keep/public .
          mkdir -p tommyman/client && mv /tmp/keep/tommyman-client-public tommyman/client/public
          mkdir -p cloudyman/client && mv /tmp/keep/cloudyman-client-public cloudyman/client/public
          rm -rf /tmp/keep

      - name: Push Client
        run: |
          git config user.name "chiefmikey"
          git config user.email "wolfemikl@gmail.com"
          git add .
          git commit -am 'Update production build'
          git push -fu origin HEAD:client
